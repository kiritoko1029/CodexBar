name: Build App

on:
  workflow_dispatch:
    inputs:
      arches:
        description: "Architectures to package."
        required: false
        default: "arm64 x86_64"
        type: string
  push:
    branches: ["**"]

concurrency:
  group: build-app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-app:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      ARCHES: ${{ inputs.arches || 'arm64 x86_64' }}
      CODEXBAR_SIGNING: adhoc
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.1.1 (if present) or fallback to default
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.1.1.app /Applications/Xcode_26.1.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "${candidate}/Contents/Developer"
              echo "DEVELOPER_DIR=${candidate}/Contents/Developer" >> "$GITHUB_ENV"
              break
            fi
          done
          /usr/bin/xcodebuild -version

      - name: Swift toolchain version
        run: |
          set -euo pipefail
          swift --version
          swift package --version

      - name: Install lint tools
        run: ./Scripts/install_lint_tools.sh

      - name: Lint
        run: ./Scripts/lint.sh lint

      - name: Swift Test
        timeout-minutes: 60
        run: python3 Scripts/ci_swift_test_by_suite.py --group-size 1 --timeout 120

      - name: Package app
        run: ./Scripts/package_app.sh release

      - name: Zip app
        id: zip
        shell: bash
        run: |
          set -euo pipefail
          source version.env
          SAFE_REF_NAME="${GITHUB_REF_NAME//\//-}"
          ZIP_NAME="CodexBar-${SAFE_REF_NAME}-${MARKETING_VERSION}-adhoc.zip"
          ditto --norsrc -c -k --keepParent CodexBar.app "$ZIP_NAME"
          shasum -a 256 "$ZIP_NAME" > "$ZIP_NAME.sha256"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "safe_ref_name=$SAFE_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: codexbar-app-${{ steps.zip.outputs.safe_ref_name }}
          path: |
            ${{ steps.zip.outputs.zip_name }}
            ${{ steps.zip.outputs.zip_name }}.sha256
